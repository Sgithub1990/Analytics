# Name of the workflow shown in the GitHub Actions tab
name: Android CI

# Define when this workflow should run
on:

  # Run whenever code is pushed to the main branch
#  push:
#    branches:
#      - main

  # Also run when a Pull Request is created for the main branch
  pull_request:
    branches:
      - main

# A workflow can contain one or more jobs
jobs:

  # Job name (can be anything)
  build:

    # GitHub creates an Ubuntu virtual machine for this job
    runs-on: ubuntu-latest

    # List of steps executed one after another
    steps:

      # Step 1: Download your repository code into the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install Java 17 (required for Android builds)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          # Java distribution
          distribution: temurin

          # JDK version
          java-version: 17

      # Step 3: Give execute permission to gradlew
      # Linux runners need this permission before running Gradle
      - name: Grant Execute Permission
        run: chmod +x gradlew

      # Step 4: Build the Debug APK
      # Same as clicking "Build APK" in Android Studio
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Step 5: Run all local unit tests
      # Tests inside src/test/
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # Step 6: Run Android Lint
      # Finds common code quality issues
      - name: Run Lint
        run: ./gradlew lintDebug

      # Step 7: Upload the generated APK
      # You can download it from the GitHub Actions page
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:

          # Name displayed in the Artifacts section
          name: Debug APK

          # Location of the generated APK
          path: app/build/outputs/apk/debug/app-debug.apk